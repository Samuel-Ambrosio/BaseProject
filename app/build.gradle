import com.ghrisav.AppConfig
import com.ghrisav.dependencies.Modules
import com.ghrisav.dependencies.Plugins

apply plugin: Plugins.androidApplication
apply from: "$rootDir/base_build__android.gradle"

android {
    defaultConfig {
        applicationId AppConfig.applicationId
    }
}

dependencies {
    implementation project(Modules.common)
    implementation project(Modules.commonAndroid)

    implementation project(Modules.dataApi)
    implementation project(Modules.dataLocal)
    implementation project(Modules.dataModel)
    implementation project(Modules.dataRepository)

    implementation project(Modules.featuresLogin)
    implementation project(Modules.featuresHome)
}